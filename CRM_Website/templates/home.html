{% extends "base.html" %}

{% block content %}
    {% if user.is_authenticated %}
    <h1>Hello World!</h1>
    {% else %}
    <form method="POST" action="{% url 'home' %}">
    {% csrf_token %}

        <div class="mb-3">
            <input
                type="text"
                name="username"
                placeholder="Username"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <input
                type="password"
                name="password"
                placeholder="Password"
                class="form-control"
                required>
        </div>

        <button type="submit" class="btn btn-secondary">
            Login
        </button>
    </form>
    {% endif %}
{% endblock %}
